name: FinOps as Code - CI/CD Pipeline - Cleanup Block Storage Idle

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop 

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: '3.13'
  TF_VERSION: '1.5.7'
  
  # -- Container Registry -- 
  REGISTRY_TYPE: 'ecr' # Opções: 'ecr' ou 'dockerhub'
  IMAGE_NAME: 'fac-cleanup-block-storage-idle'  
  
  # -- Package Manager -- 
  PACKAGE_MANAGER: 'uv' # Opções: 'uv' ou 'poetry'

jobs:
  infracost-analysis:
    name: FinOps Cost Estimate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Checkout Base Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base_code
        
      - name: Gerar Infracost Baseline
        run: |
          infracost breakdown --path base_code/iac --format json --out-file /tmp/infracost-base.json --terraform-var "container_image_tag=latest" --terraform-var "environment=dev"

      - name: Gerar Infracost Diff
        run: |
          infracost diff --path iac --compare-to /tmp/infracost-base.json --format json --out-file /tmp/infracost.json --terraform-var "container_image_tag=latest" --terraform-var "environment=dev"
      
      - name: Comentar Infracost no PR
        uses: infracost/actions/comment@v3
        with:
          path: /tmp/infracost.json
          behavior: update

          
  code-quality-tests:
    name: Code Quality & Security
    runs-on: ubuntu-latest
   
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      # ======================================================
      # PACKAGE MANAGER UV
      # ======================================================
      - name: Instalar e Configurar UV
        if: env.PACKAGE_MANAGER == 'uv'
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
          enable-cache: true

      - name: Configurar Python (UV)
        if: env.PACKAGE_MANAGER == 'uv'
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Instalar Dependências (UV)
        if: env.PACKAGE_MANAGER == 'uv'
        run: uv sync --frozen

      # ======================================================
      # PACKAGE MANAGER POETRY
      # ======================================================
      - name: Instalar Poetry
        if: env.PACKAGE_MANAGER == 'poetry'
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Configurar Python (Standard)
        if: env.PACKAGE_MANAGER == 'poetry'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'poetry'

      - name: Instalar Dependências (Poetry)
        if: env.PACKAGE_MANAGER == 'poetry'
        run: poetry install --no-interaction --no-root

      # ======================================================
      # Linter, Segurança e Qualidade e Testes
      # ======================================================
      - name: Linting e Formatação (Ruff)
        run: |
          if [ "$PACKAGE_MANAGER" == "poetry" ]; then
            poetry run ruff check .
            poetry run ruff format --check .
          else
            uv run ruff check .
            uv run ruff check --fix .
          fi

      - name: Análise de Segurança (Bandit)
        run: |
          if [ "$PACKAGE_MANAGER" == "poetry" ]; then
             poetry run bandit -r . -c "pyproject.toml" || true
          else
             uv run bandit -c pyproject.toml -r .
          fi

      - name: Testes Unitários
        run: |
          if [ ! -d "tests" ]; then
            echo "Diretório 'tests' não encontrado. Pulando testes unitários."
          else
            if [ "$PACKAGE_MANAGER" == "poetry" ]; then
               poetry run pytest --cov=./ --cov-report=xml
            else
               uv run pytest --cov=./ --cov-report=xml
            fi
          fi

      # ======================================================
      # QUALIDADE IAC Terraform
      # ======================================================
      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Files
        run: terraform fmt -recursive iac

      - name: Terraform Validate Init
        working-directory: ./iac
        run: terraform init -backend=false && terraform validate

      - name: Segurança e Compliance IaC (Checkov)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: iac
          framework: terraform
          soft_fail: true


  build-push-image:
    name: Build & Push to Container Registry
    runs-on: ubuntu-latest
    needs: [code-quality-tests]        
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configurar AWS Credentials
        if: env.REGISTRY_TYPE == 'ecr'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        if: env.REGISTRY_TYPE == 'ecr'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Criacao do repositorio ECR
        if: env.REGISTRY_TYPE == 'ecr'
        run: |
          REPO_NAME="${{ env.IMAGE_NAME }}"
          REGION="${{ env.AWS_REGION }}"

          echo "Verificando se o repositorio ECR $REPO_NAME existe..."
          aws ecr describe-repositories --repository-names "$REPO_NAME" --region "$REGION" > /dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$REPO_NAME" --region "$REGION"

          echo "Repositorio ECR $REPO_NAME verificado/criado com sucesso."
        
      - name: Login Docker Hub
        if: env.REGISTRY_TYPE == 'dockerhub'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Gerar Metadata & Normalizar Tags
        id: meta
        run: |
          echo "Iniciando geração de tags..."

          SHA_SHORT=$(git rev-parse --short HEAD)
          
          RAW_IMAGE_NAME="${{ env.IMAGE_NAME }}"

          if [ -z "$RAW_IMAGE_NAME" ]; then
            echo "A variavel IMAGE_NAME esta vazia no env"
            exit 1
          fi

          LOWER_IMAGE_NAME=$(echo "$RAW_IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          
          if [ "${{ env.REGISTRY_TYPE}}" == "ecr" ]; then
            REGISTRY="${{ steps.login-ecr.outputs.registry }}"

            FULL_NAME="$REGISTRY/$LOWER_IMAGE_NAME"  

          else
            FULL_NAME="$LOWER_IMAGE_NAME"
          fi
          echo "Tag gerada: $FULL_NAME:$SHA_SHORT"

          echo "full_image=$FULL_NAME" >> $GITHUB_OUTPUT
          echo "tag=$SHA_SHORT" >> $GITHUB_OUTPUT
          
      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.full_image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.full_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
        

  terraform-deploy:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: [build-push-image]
   
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}

    defaults:
      run:
        working-directory: ./iac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Init
        run: terraform init

      - name: Plan
        id: plan
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)

          terraform plan -no-color -out=tfplan \
          -var="container_image_tag=$SHA_SHORT" \
          -var="environment=${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}"

      - name: Apply
        run: terraform apply -auto-approve tfplan